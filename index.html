<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Cozy Portfolio</title>
    <link rel="stylesheet" href="style.css">
</head>
<script 
src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.0/jqery.min.js"></script>
<body>

    <nav>
        <div class="logo">Art & Soul</div>
        <ul>
            <li><a href="#home">Home</a></li>
            <li><a href="#about">About</a></li>
            <li><a href="#portfolio">Portfolio</a></li>
            <li><a href="#contact">Contact</a></li>
        </ul>
    </nav>

    <section id="home" class="hero">
        <h1>Welcome to my Creative Space</h1>
        <p>Warmth, illustrations, and digital stories.</p>
    </section>

    <section id="portfolio">
        <h2>My Work</h2>
        <div class="gallery">
            <div class="art-card"><img src="Baby duck.png" alt="Illustration 1"></div>
            <div class="art-card"><img src="art2.png" alt="Illustration 2"></div>
            <div class="art-card"><img src="art3.png" alt="Illustration 3"></div>
        </div>
    </section>

    <section id="about">
        <h2>About the Artist</h2>
        <p>Passionate about art,loves cute things,food and being silly.</p>
    </section>

    <section id="contact">
        <h2>Get in Touch</h2>
        <form id="contactForm">
            <input type="text" placeholder="Your Name" required>
            <input type="email" placeholder="Your Email" required>
            <button type="submit">Send Message</button>
        </form>
    </section>

    <script src="script.js"></script>
</body>
</html>
